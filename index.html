<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper"></div>

    <div class="main-overlay">
        <div class="center-content">
            <img src="logo.png" alt="Logo" class="logo">
            
            <div class="server-info">
                <h1 id="servername">ИМЯ СЕРВЕРА</h1>
                <h2>КАРТА: <span id="mapname" style="color: white;">ЗАГРУЗКА...</span></h2>
            </div>
        </div>

        <div class="loading-status">
            <p>Осталось файлов</p>
            <span><span id="remain">0</span> / <span id="total">0</span></span>
        </div>

        <div class="credits">
            Оригинальный аддон: <b>Foohy</b><br>
            Перевод и локализация: <i>[G]Pikachu</i>
        </div>
    </div>

    <script>
        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            document.getElementById('servername').innerHTML = servername;
            document.getElementById('mapname').innerHTML = mapname;
        }

        function SetFilesTotal(total) {
            document.getElementById('total').innerHTML = total;
        }

        function SetFilesNeeded(needed) {
            document.getElementById('remain').innerHTML = needed;
        }

        // GameDetails("MY AWESOME SERVER", "", "jazz_apartments", 32, "0", "jazztronauts");
        // SetFilesTotal(100);
        // SetFilesNeeded(45);
    </script>
</body>
</html>
